name: ENAFUL-BOT-RUNNER

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # যদি ফাইল থাকে তবেই ইনস্টল করবে, নয়তো স্কিপ করবে
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # সরাসরি fbchat ইনস্টল করে রাখা ভালো যদি ফাইল না থাকে
          pip install fbchat requests 

      - name: Run ENAFUL Bot
        env:
          FB_COOKIE: ${{ secrets.FB_COOKIE }}
          ADMIN_ID: "100001890117053"
        run: python main.py
